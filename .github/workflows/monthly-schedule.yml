name: Monthly Schedule

on:
  schedule:
    - cron: '30 8 25 * *'
  workflow_dispatch:

jobs:
  monthly:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install pandas numpy requests openpyxl

      - name: Fetch real reservations
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
        run: python feishu_bot.py --dry-run

      - name: Inject GitHub Token into schedule editor
        run: |
          sed -i "s/__GH_TOKEN__/${{ secrets.GH_PAT }}/g" publish/schedule.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./publish
          keep_files: true
