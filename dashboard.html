<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>需求日报 - GZU</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f5f7fa;color:#333}
.header{background:linear-gradient(135deg,#1a73e8 0%,#0d47a1 100%);color:#fff;padding:18px 24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.header h1{font-size:20px}
.header .nav a{color:#fff;opacity:0.8;text-decoration:none;font-size:13px;margin-left:14px}
.header .nav a:hover{opacity:1}
.section{margin:20px 24px}
.section-title{font-size:15px;font-weight:700;color:#1a73e8;padding:10px 14px;background:#e8f0fe;border-radius:8px;margin-bottom:12px;border-left:4px solid #1a73e8}
.badges{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:8px;font-size:13px}
.badge .lbl{font-size:11px;opacity:0.85}
.badge .val{font-weight:700;font-size:18px}
.badge-persons{background:#e8f0fe;color:#1a73e8}
.badge-mod{color:#fff;font-weight:600;font-size:12px}
.badge-time{background:#fff;border:1px solid #ddd}
.badge-time .val{font-size:15px;color:#e65100;font-weight:700}
.table-wrap{overflow-x:auto;background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.rpt-table{width:100%;border-collapse:collapse;font-size:12px}
.rpt-table th{background:#f0f5ff;color:#1a73e8;font-weight:600;padding:7px 10px;text-align:left;border-bottom:2px solid #c5d9f5;white-space:nowrap;font-size:11px}
.rpt-table td{padding:7px 10px;border-bottom:1px solid #eef2f7;vertical-align:middle}
.rpt-table tr:hover td{background:#f8fafe}
.time-col{font-weight:600;white-space:nowrap;min-width:50px}
.count-col{text-align:center;font-weight:700;font-size:15px;color:#1a73e8;min-width:36px}
.bar-col{min-width:70px}
.bar-track{background:#eef2f7;border-radius:4px;height:14px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width 0.4s}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;margin:1px 2px;color:#fff}
.tag-ct{background:#9C27B0}.tag-xray{background:#2196F3}.tag-bus{background:#4CAF50}
.tag-echo{background:#00BCD4}.tag-bone{background:#795548}.tag-mammo{background:#FF9800}
.tag-ob-g{background:#4CAF50}.tag-ob-o{background:#FF9800}.tag-ob-p{background:#E91E63}
.footer{text-align:center;padding:16px;font-size:11px;color:#999}
.empty{text-align:center;padding:40px;color:#999;font-size:14px}
.ftab{padding:7px 18px;border-radius:6px 6px 0 0;background:#e8ecf1;border:none;cursor:pointer;font-size:13px;font-weight:500}
.ftab.active{background:#1a73e8;color:#fff}
@media(max-width:768px){.section{margin:10px 12px}.header h1{font-size:17px}}
</style>
</head>
<body>

<div class="header">
    <h1>明日需求日报 <span id="hdDate"></span></h1>
    <div class="nav">
        <a href="index.html">首页</a>
        <a href="schedule.html">排班表</a>
    </div>
</div>

<div id="content"><div class="empty">加载中...</div></div>
<div class="footer">数据来源: 飞书 Bitable | 由 GitHub Actions 每日自动更新</div>

<script>
var MOD_CN={'MRI':'MRI','CT':'CT','X-ray':'X-ray','Mammo':'钼靶','BoneDensity':'骨密度','B-ultrasound':'B超','Echo':'心彩'};
var MOD_COLORS={'MRI':'#E91E63','CT':'#9C27B0','X-ray':'#2196F3','Mammo':'#FF9800','BoneDensity':'#795548','B-ultrasound':'#4CAF50','Echo':'#00BCD4'};
var MOD_KEYS=['CT','X-ray','B-ultrasound','Echo','Mammo','BoneDensity','MRI'];
var OB_CLASSES=['OB','NT','Anatomy'];
var OB_CN={'OB':'OB超声','NT':'NT','Anatomy':'大排畸'};
var OB_COLORS={'OB':'#4CAF50','NT':'#FF9800','Anatomy':'#E91E63'};
var OB_TAG_CLS={'OB':'tag-ob-g','NT':'tag-ob-o','Anatomy':'tag-ob-p'};

async function init(){
    try{
        var resp=await fetch('daily_data.json?'+Date.now());
        if(!resp.ok)throw new Error('HTTP '+resp.status);
        render(await resp.json());
    }catch(e){
        document.getElementById('content').innerHTML='<div class="empty">数据加载失败<br><small>'+e.message+'</small></div>';
    }
}

function render(data){
    var html='',ck=data.checkup||{},ob=data.ob||{};
    document.getElementById('hdDate').textContent=(data.target_date||'')+' ('+(data.weekday||'')+')';

    // ====== CHECKUP ======
    html+='<div class="section"><div class="section-title">真实预约 &mdash; 体检人群</div>';
    html+=renderBadges(ck.total_persons||0,ck.total_counts||{},MOD_KEYS,MOD_CN,MOD_COLORS);
    var tm=ck.total_tech_minutes||0,dm=ck.total_doc_minutes||0;
    html+='<div class="badges"><div class="badge badge-time"><span class="lbl">预估操作 </span><span class="val">'+tm+'min ('+(tm/60).toFixed(1)+'h)</span></div><div class="badge badge-time"><span class="lbl">预估报告 </span><span class="val">'+dm+'min ('+(dm/60).toFixed(1)+'h)</span></div></div>';
    html+=renderTimeTable(ck.time_slots||[],ck.person_count||[],ck.counts||{},MOD_KEYS,MOD_CN,MOD_COLORS,'#1a73e8','#4a9af5');
    html+='</div>';

    // ====== OB ======
    var obTotal=0;for(var i=0;i<OB_CLASSES.length;i++)obTotal+=(ob.total_counts||{})[OB_CLASSES[i]]||0;
    html+='<div class="section"><div class="section-title">真实预约 &mdash; OB超声</div>';
    if(obTotal>0){
        html+=renderBadges(obTotal,ob.total_counts||{},OB_CLASSES,OB_CN,OB_COLORS);
        html+='<div class="table-wrap" style="padding:12px"><div id="chartOB" style="height:350px"></div></div>';
        // Store OB data for chart rendering
        window._obData = ob;
        loadECharts(function(){drawOBChart(ob);});
    }else{html+='<div class="badges"><span style="color:#999;font-size:13px">暂无OB超声预约</span></div>';}
    html+='</div>';

    // ====== FORECAST ======
    html+='<div class="section"><div class="section-title">需求预测</div><div id="forecastContent"><div class="empty">预测数据加载中...</div></div></div>';

    document.getElementById('content').innerHTML=html;
    fetchForecast();
}

function renderBadges(total,counts,keys,labels,colors){
    var h='<div class="badges"><div class="badge badge-persons"><span class="lbl">总人次</span><span class="val">'+total+'</span></div>';
    for(var i=0;i<keys.length;i++){var k=keys[i],n=counts[k]||0;if(n>0)h+='<div class="badge badge-mod" style="background:'+colors[k]+'">'+labels[k]+' '+n+'</div>';}
    return h+'</div>';
}

function renderTimeTable(times,persons,counts,keys,labels,colors,bar1,bar2){
    bar1=bar1||'#1a73e8';bar2=bar2||'#4a9af5';
    var maxV=1,rows=[];
    for(var t=0;t<times.length;t++){
        var total=0;for(var i=0;i<keys.length;i++)total+=((counts[keys[i]]||[])[t]||0);
        if(total>0||persons){rows.push({ts:times[t],p:persons?persons[t]||0:total,total:total,idx:t});if(total>maxV)maxV=total;}
    }
    if(rows.length===0)return '<div class="empty">暂无数据</div>';
    var h='<div class="table-wrap"><table class="rpt-table"><thead><tr><th>时间</th><th style="text-align:center">人次</th><th>负荷</th><th>检查项</th></tr></thead><tbody>';
    for(var r=0;r<rows.length;r++){
        var row=rows[r],pct=Math.round(row.total/maxV*100),ti=row.idx;
        var tagHtml='';
        for(var i=0;i<keys.length;i++){
            var k=keys[i],n=(counts[k]||[])[ti]||0;
            if(n>0){var cls=getTagClass(k);tagHtml+='<span class="tag '+cls+'">'+labels[k]+' '+n+'</span>';}
        }
        h+='<tr><td class="time-col">'+row.ts+'</td><td class="count-col">'+row.p+'</td><td class="bar-col"><div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:linear-gradient(90deg,'+bar1+','+bar2+')"></div></div></td><td>'+(tagHtml||'<span style="color:#ccc">-</span>')+'</td></tr>';
    }
    return h+'</tbody></table></div>';
}

function getTagClass(k){
    if(k==='CT')return'tag-ct';if(k==='X-ray')return'tag-xray';if(k==='B-ultrasound')return'tag-bus';
    if(k==='Echo')return'tag-echo';if(k==='Mammo')return'tag-mammo';if(k==='BoneDensity')return'tag-bone';
    if(k==='OB')return'tag-ob-g';if(k==='NT')return'tag-ob-o';if(k==='Anatomy')return'tag-ob-p';
    return'tag-ct';
}

// ============ FORECAST (unchanged) ============
function fetchForecast(){
    fetch('forecast_data.json?'+Date.now()).then(function(r){if(r.ok)return r.json();throw new Error('no data');}).then(function(fd){renderForecast(fd);}).catch(function(e){document.getElementById('forecastContent').innerHTML='<div class="empty">预测数据暂未生成<br><small>请运行完整流水线生成当月预测</small></div>';});
}
function renderForecast(fd){
    var html='',cats=['超声','放射'],colors={超声:{tech:'#1a73e8',doc:'#4CAF50'},放射:{tech:'#FF9800',doc:'#F44336'}},tm=0,dm=0;
    for(var c=0;c<cats.length;c++){var dt=fd.daily_trend[cats[c]];if(dt)for(var i=0;i<dt.tech_minutes.length;i++){tm+=dt.tech_minutes[i]||0;dm+=dt.doc_minutes[i]||0;}}
    html+='<div class="badges"><div class="badge badge-time"><span class="lbl">预测技师 </span><span class="val">'+(tm/60).toFixed(0)+'h</span></div><div class="badge badge-time"><span class="lbl">预测医生 </span><span class="val">'+(dm/60).toFixed(0)+'h</span></div></div>';
    var activeCat=cats[0];
    html+='<div style="display:flex;gap:4px;margin-bottom:12px">';
    for(var c=0;c<cats.length;c++)html+='<button class="ftab'+(cats[c]===activeCat?' active':'')+'" data-cat="'+cats[c]+'" onclick="switchFCat(this)">'+cats[c]+'</button>';
    html+='</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px"><div class="table-wrap" style="padding:12px"><div id="fcTrend" style="height:320px"></div></div><div class="table-wrap" style="padding:12px"><div id="fcHeat" style="height:320px"></div></div></div>';
    // Date picker for hourly chart
    var allDates=fd.hourly_line[cats[0]]?Object.keys(fd.hourly_line[cats[0]]).sort():[];
    html+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><span style="font-size:13px;color:#666;font-weight:500">选择日期查看小时明细:</span><select id="fcDateSelect" onchange="redrawHourly()" style="padding:5px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px">';
    for(var d=0;d<allDates.length;d++)html+='<option value="'+allDates[d]+'"'+(d===allDates.length-1?' selected':'')+'>'+allDates[d]+'</option>';
    html+='</select></div>';
    html+='<div class="table-wrap" style="padding:12px;margin-bottom:12px"><div id="fcHourly" style="height:280px"></div></div>';
    document.getElementById('forecastContent').innerHTML=html;
    window._fcData=fd;window._fcColors=colors;window._fcCat=activeCat;
}

var _echartsLoaded=false,_echartsQueue=[];
function loadECharts(cb){
    if(window.echarts){cb();return;}
    _echartsQueue.push(cb);
    if(_echartsLoaded)return;_echartsLoaded=true;
    var s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js';
    s.onload=function(){for(var i=0;i<_echartsQueue.length;i++)_echartsQueue[i]();_echartsQueue=[];};
    document.head.appendChild(s);
}
function drawOBChart(ob){
    try{
        var dom=document.getElementById('chartOB');if(!dom)return;
        var chart=echarts.getInstanceByDom(dom)||echarts.init(dom);
        var times=ob.time_slots||[],series=[];
        for(var i=0;i<OB_CLASSES.length;i++){
            var k=OB_CLASSES[i],vals=[],has=false;
            for(var t=0;t<times.length;t++){var n=((ob.counts||{})[k]||[])[t]||0;vals.push(n);if(n>0)has=true;}
            if(has)series.push({name:OB_CN[k],type:'bar',data:vals,itemStyle:{color:OB_COLORS[k]},barMaxWidth:28});
        }
        if(series.length===0)return;
        chart.setOption({
            tooltip:{trigger:'axis',axisPointer:{type:'shadow'}},
            legend:{top:0,textStyle:{fontSize:11}},
            xAxis:{type:'category',data:times,axisLabel:{rotate:45,fontSize:9}},
            yAxis:{type:'value',name:'人次',minInterval:1},
            series:series,
            grid:{left:40,right:15,top:36,bottom:60}
        });
    }catch(e){}
}
function switchFCat(btn){var btns=document.querySelectorAll('.ftab');for(var i=0;i<btns.length;i++)btns[i].classList.remove('active');btn.classList.add('active');window._fcCat=btn.dataset.cat;
    // Update date picker options
    var allDates=window._fcData.hourly_line[btn.dataset.cat]?Object.keys(window._fcData.hourly_line[btn.dataset.cat]).sort():[];
    var sel=document.getElementById('fcDateSelect');if(sel){sel.innerHTML='';for(var d=0;d<allDates.length;d++)sel.innerHTML+='<option value=\"'+allDates[d]+'\"'+(d===allDates.length-1?' selected':'')+'>'+allDates[d]+'</option>';}
    drawFC(window._fcData,btn.dataset.cat);}
function drawFC(fd,cat){
    var dt=fd.daily_trend[cat],hd=fd.heatmap_data[cat],hl=fd.hourly_line[cat],colors=window._fcColors;if(!dt)return;
    // Trend + Heatmap
    try{var tDom=document.getElementById('fcTrend');if(tDom){var tc=echarts.getInstanceByDom(tDom)||echarts.init(tDom);tc.setOption({tooltip:{trigger:'axis'},legend:{data:['技师','医生'],top:5},xAxis:{type:'category',data:dt.dates,axisLabel:{rotate:30,fontSize:9}},yAxis:{type:'value',name:'分钟'},series:[{name:'技师',type:'line',data:dt.tech_minutes,smooth:true,lineStyle:{color:colors[cat].tech},itemStyle:{color:colors[cat].tech}},{name:'医生',type:'line',data:dt.doc_minutes,smooth:true,lineStyle:{color:colors[cat].doc},itemStyle:{color:colors[cat].doc}}],grid:{left:50,right:15,top:40,bottom:50}});}}catch(e){}
    try{var hDom=document.getElementById('fcHeat');if(hDom&&hd&&hd.tech_minutes){var hc=echarts.getInstanceByDom(hDom)||echarts.init(hDom);var merged=[];for(var h=0;h<hd.tech_minutes.matrix.length;h++)for(var d=0;d<hd.tech_minutes.dates.length;d++){var tv=hd.tech_minutes.matrix[h][d],dv=(hd.doc_minutes&&hd.doc_minutes.matrix[h])?hd.doc_minutes.matrix[h][d]:0;merged.push([d,h,parseFloat((tv+dv).toFixed(1))]);}hc.setOption({tooltip:{position:'top'},xAxis:{type:'category',data:hd.tech_minutes.dates,axisLabel:{rotate:45,fontSize:8}},yAxis:{type:'category',data:hd.tech_minutes.hours.map(function(h){return h+':00'}),inverse:true},visualMap:{min:0,max:60,calculable:true,orient:'horizontal',left:'center',bottom:0,inRange:{color:['#f0f5ff','#1a73e8','#0d47a1']}},series:[{type:'heatmap',data:merged,label:{show:true,fontSize:7}}],grid:{left:45,right:20,top:5,bottom:70}});}}catch(e){}
    // Hourly
    drawHourlyForDate(fd,cat);
}
function redrawHourly(){drawHourlyForDate(window._fcData,window._fcCat);}
function drawHourlyForDate(fd,cat){
    var hl=fd.hourly_line[cat],colors=window._fcColors;if(!hl)return;
    var sel=document.getElementById('fcDateSelect');
    var selDate=sel?sel.value:Object.keys(hl).sort().pop();
    var dayData=hl[selDate]||{tech_minutes:[],doc_minutes:[]};
    try{var lDom=document.getElementById('fcHourly');if(lDom){var lc=echarts.getInstanceByDom(lDom)||echarts.init(lDom);var hours=[];for(var h=0;h<24;h++)hours.push(h+':00');lc.setOption({tooltip:{trigger:'axis'},legend:{data:['技师','医生'],top:5},xAxis:{type:'category',data:hours,axisLabel:{rotate:30,fontSize:9}},yAxis:{type:'value',name:'分钟'},series:[{name:'技师',type:'bar',data:dayData.tech_minutes,itemStyle:{color:colors[cat].tech},barGap:'10%'},{name:'医生',type:'bar',data:dayData.doc_minutes,itemStyle:{color:colors[cat].doc}}],grid:{left:50,right:15,top:40,bottom:50}});}}catch(e){}
}

window.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
